<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트립픽</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://js.puter.com/v2/"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F4F0;--white:#FFFFFF;--ink:#18181B;--muted:#71717A;
  --border:#E4E4E7;--forest:#1B4332;--forest2:#2D6A4F;--forest-bg:#F0F7F4;
  --gold:#C9973A;--gold-bg:#FDF8EE;--gold-border:#EDD898;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
  --red:#DC2626;--red-bg:#FEF2F2;
  --green:#16A34A;--green-bg:#F0FDF4;--green-border:#BBF7D0;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --orange:#EA580C;--orange-bg:#FFF7ED;--orange-border:#FED7AA;
  --sky:#0284C7;--sky-bg:#F0F9FF;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
nav{background:var(--forest);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:200}
.logo{font-size:1.1rem;font-weight:600;color:#fff;letter-spacing:-0.02em}
.logo em{color:#F0C060;font-style:normal}
.nav-sub{font-size:0.65rem;color:rgba(255,255,255,0.4);letter-spacing:0.06em;text-transform:uppercase}
.nav-actions{margin-left:auto;display:flex;gap:0.5rem;align-items:center}
.nav-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:0.3rem 0.75rem;border-radius:6px;font-family:'Pretendard',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:background 0.15s}
.nav-btn:hover{background:rgba(255,255,255,0.22)}
.nav-btn.save{background:rgba(240,192,96,0.25);border-color:rgba(240,192,96,0.45)}
.nav-btn.save:hover{background:rgba(240,192,96,0.4)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--white);border-radius:12px;width:440px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:0.95rem;font-weight:600}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 0.2rem}
.modal-body{padding:1rem 1.25rem;overflow-y:auto;flex:1}
.modal-foot{padding:0.75rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;justify-content:flex-end}
.save-list{display:flex;flex-direction:column;gap:0.5rem}
.save-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.85rem;border:1px solid var(--border);border-radius:8px;transition:all 0.15s}
.save-item:hover{border-color:var(--forest2);background:var(--forest-bg)}
.si-icon{font-size:1.5rem}
.si-info{flex:1;min-width:0;cursor:pointer}
.si-name{font-size:0.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-meta{font-size:0.7rem;color:var(--muted);margin-top:1px}
.si-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;padding:0.2rem 0.4rem;border-radius:4px;flex-shrink:0}
.si-del:hover{background:var(--red-bg);color:var(--red)}
.flight-dur{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.5rem}
.flight-dur label{font-size:0.72rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.flight-dur input{width:64px;text-align:center}
.flight-dur span{font-size:0.72rem;color:var(--muted)}
.app{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:1.25rem 1.1rem;display:flex;flex-direction:column;gap:0}
.sec{margin-bottom:1.1rem}
.slabel{font-size:0.63rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:0.45rem;display:flex;align-items:center;gap:0.4rem}
.field{margin-bottom:0.6rem}
.field label{display:block;font-size:0.75rem;font-weight:500;margin-bottom:0.22rem;color:var(--muted)}
input[type=text],input[type=date],input[type=time],select,textarea{
  width:100%;padding:0.42rem 0.65rem;border:1px solid var(--border);border-radius:6px;
  font-family:'Pretendard',sans-serif;font-size:0.82rem;color:var(--ink);
  background:var(--white);outline:none;transition:border-color 0.15s;appearance:none
}
input:focus,select:focus,textarea:focus{border-color:var(--forest2)}
textarea{resize:vertical;min-height:52px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.4rem}
hr.div{border:none;border-top:1px solid var(--border);margin:0.9rem 0}

/* FLIGHT BLOCK */
.flight-block{background:var(--sky-bg);border:1px solid #BAE6FD;border-radius:8px;padding:0.75rem 0.85rem;margin-bottom:0.5rem}
.flight-head{font-size:0.75rem;font-weight:600;color:var(--sky);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem}
.flight-route{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.5rem}
.flight-ap{flex:1}
.flight-ap input{text-align:center;font-weight:600;font-size:0.85rem}
.flight-arrow{font-size:0.9rem;color:var(--sky);flex-shrink:0}

/* TOGGLE SWITCH */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0}
.toggle-row label{font-size:0.8rem;font-weight:500;color:var(--ink)}
.toggle-row small{font-size:0.7rem;color:var(--muted);display:block;margin-top:1px}
.switch{position:relative;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:background 0.2s}
.switch-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform 0.2s}
.switch input:checked+.switch-slider{background:var(--forest)}
.switch input:checked+.switch-slider::before{transform:translateX(16px)}

/* HOTEL CARDS */
.hotel-list{display:flex;flex-direction:column;gap:0.5rem}
.hotel-card{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:8px;padding:0.65rem 0.75rem;position:relative}
.hotel-card .hotel-num{font-size:0.68rem;font-weight:600;color:var(--gold);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.hotel-rm{position:absolute;top:0.5rem;right:0.5rem;background:none;border:none;cursor:pointer;font-size:0.8rem;color:var(--muted)}
.hotel-rm:hover{color:var(--red)}
.add-hotel-btn{display:flex;align-items:center;justify-content:center;gap:0.4rem;width:100%;padding:0.45rem;border:1.5px dashed var(--gold-border);border-radius:7px;background:transparent;color:var(--gold);font-family:'Pretendard',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.15s;margin-top:0.4rem}
.add-hotel-btn:hover{background:var(--gold-bg);border-color:var(--gold)}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--border);border-radius:7px;padding:0.9rem;text-align:center;cursor:pointer;position:relative;background:var(--bg);transition:all 0.15s}
.upload-zone:hover{border-color:var(--forest2);background:var(--forest-bg)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{font-size:0.72rem;color:var(--muted);line-height:1.5}
.thumb-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.thumb-wrap{position:relative}
.thumb{width:44px;height:44px;border-radius:5px;object-fit:cover;display:block}
.thumb-rm{position:absolute;top:-4px;right:-4px;width:15px;height:15px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* BUTTON */
.btn{display:block;width:100%;padding:0.65rem;background:var(--forest);color:#fff;border:none;border-radius:7px;font-family:'Pretendard',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:background 0.15s,transform 0.1s;text-align:center}
.btn:hover{background:var(--forest2)}
.btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.btn-sm{width:auto;display:inline-block;padding:0.3rem 0.65rem;font-size:0.75rem;border-radius:5px}
.btn-outline{background:transparent;color:var(--forest);border:1px solid var(--forest)}
.btn-outline:hover{background:var(--forest-bg)}
.err-msg{background:var(--red-bg);border:1px solid #FCA5A5;border-radius:6px;padding:0.6rem 0.8rem;font-size:0.78rem;color:var(--red);display:none;margin-top:0.5rem}

/* MAIN */
.main{overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:0.6rem;color:var(--muted);text-align:center}
.empty-icon{font-size:3rem;margin-bottom:0.5rem}
.loading-state{display:none;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:0.75rem;color:var(--muted)}
.loading-state.on{display:flex}
.spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--forest);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem}
.s-chip{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.6rem;text-align:center}
.s-chip .v{font-size:0.85rem;font-weight:600}
.s-chip .k{font-size:0.6rem;color:var(--muted);margin-top:2px}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-head{padding:0.7rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}

/* MAP */
#map{height:300px}

/* TABS */
.tabs{display:flex;gap:3px;padding:0.75rem 1rem 0;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{flex-shrink:0;padding:0.35rem 0.9rem;border-radius:6px 6px 0 0;border:1px solid transparent;background:transparent;color:var(--muted);font-size:0.78rem;font-weight:500;cursor:pointer;font-family:'Pretendard',sans-serif;transition:all 0.12s}
.tab:hover{color:var(--ink);background:var(--bg)}
.tab.active{background:var(--white);color:var(--forest);font-weight:600;border-color:var(--border);border-bottom-color:var(--white);margin-bottom:-1px}

/* TIMELINE */
.timeline{padding:0.75rem 1rem 1.25rem;display:flex;flex-direction:column}
.tl-row{display:flex;gap:0.7rem;align-items:flex-start}
.dot-col{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0}
.dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,0.18)}
.dot-line{width:2px;flex:1;min-height:10px;background:var(--border)}
.tl-body{flex:1;padding:0.4rem 0 0.2rem;min-width:0}

/* PLACE */
.place-header{display:flex;align-items:center;gap:0.45rem;cursor:pointer;padding:0.1rem 0}
.place-time{font-size:0.7rem;color:var(--muted);font-weight:500;white-space:nowrap;min-width:36px}
.place-name{font-size:0.88rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:0.63rem;font-weight:600;white-space:nowrap}
.badge-관광{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.badge-식사{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.badge-이동{background:#F9F9F9;color:var(--muted);border:1px solid var(--border)}
.badge-숙소{background:var(--purple-bg);color:var(--purple)}
.badge-쇼핑{background:var(--red-bg);color:var(--red)}
.badge-액티비티{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-비행{background:var(--sky-bg);color:var(--sky);border:1px solid #BAE6FD}
.chevron{font-size:0.65rem;color:var(--muted);transition:transform 0.18s;flex-shrink:0}
.expanded .chevron{transform:rotate(180deg)}

.place-detail{display:none;margin-top:0.45rem;border-radius:7px;background:var(--bg);border:1px solid var(--border);overflow:hidden}
.place-detail.open{display:block}
.detail-desc{padding:0.6rem 0.8rem;font-size:0.78rem;color:#444;line-height:1.65;border-bottom:1px solid var(--border)}
.detail-meta{display:flex;gap:0.75rem;flex-wrap:wrap;padding:0.45rem 0.8rem}
.mi{font-size:0.73rem;color:var(--muted);display:flex;align-items:center;gap:0.25rem}
.mi strong{color:var(--ink)}

/* TRANSPORT */
.tr-row{display:flex;gap:0.7rem}
.tr-line-col{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0}
.tr-vline{width:2px;flex:1;background:var(--border)}
.tr-body{flex:1;padding:0.25rem 0 0.25rem}
.tr-pill{display:inline-flex;align-items:center;gap:0.35rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:0.25rem 0.6rem;font-size:0.73rem;color:var(--muted)}
.tr-pill .method{font-weight:600;color:var(--ink)}
.tr-detail{margin-top:0.2rem;font-size:0.7rem;color:var(--muted);line-height:1.55;padding-left:0.1rem}

/* FLIGHT ITEM */
.flight-item{background:var(--sky-bg);border:1px solid #BAE6FD;border-radius:8px;padding:0.65rem 0.85rem;margin-top:0.35rem}
.fi-route{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;font-weight:600;margin-bottom:0.35rem}
.fi-arrow{color:var(--sky)}
.fi-meta{display:flex;gap:0.75rem;flex-wrap:wrap}
.fi-tag{font-size:0.7rem;color:var(--sky);background:rgba(2,132,199,0.08);padding:2px 7px;border-radius:10px}

/* HOTEL ITEM */
.hotel-item{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:8px;padding:0.6rem 0.8rem;margin-top:0.35rem}
.hi-name{font-size:0.85rem;font-weight:600;margin-bottom:0.25rem}
.hi-meta{display:flex;gap:0.6rem;flex-wrap:wrap}
.hi-tag{font-size:0.7rem;color:var(--gold);background:rgba(201,151,58,0.1);padding:2px 7px;border-radius:10px}

/* MEAL OPTIONS */
.meal-opts-label{padding:0.4rem 0.8rem 0.2rem;font-size:0.72rem;color:var(--muted)}
.resto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:0.5rem;padding:0.3rem 0.7rem 0.7rem}
.rc{border:2px solid var(--border);border-radius:9px;cursor:pointer;transition:all 0.15s;background:var(--white);overflow:hidden}
.rc:hover{border-color:var(--forest2);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.rc.sel{border-color:var(--forest);background:var(--forest-bg)}
.rc-img{width:100%;height:110px;object-fit:cover;display:block;background:var(--bg)}
.rc-img-wrap{position:relative}
.rc-sel-badge{position:absolute;top:6px;left:6px;background:var(--forest);color:#fff;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px;display:none}
.rc.sel .rc-sel-badge{display:block}
.rc-body{padding:0.55rem 0.65rem}
.rc .rn{font-size:0.82rem;font-weight:600;margin-bottom:2px}
.rc .rg{font-size:0.68rem;color:var(--muted);margin-bottom:4px}
.rc .rd{font-size:0.7rem;color:var(--muted);line-height:1.4;margin-bottom:5px}
.rc-tags{display:flex;gap:4px;flex-wrap:wrap}
.rc-tag{font-size:0.63rem;padding:1px 5px;border-radius:9px}
.rc-tag.price{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.rc-tag.wait{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.rc .rt{font-size:0.67rem;color:var(--muted);margin-top:4px}

/* TIPS */
.tips-list{list-style:none;display:flex;flex-direction:column;gap:6px;padding:0.75rem 1rem}
.tips-list li{display:flex;gap:0.45rem;font-size:0.8rem;line-height:1.55}
.tips-list li::before{content:"✦";color:var(--gold);flex-shrink:0;margin-top:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>
<nav>
  <span class="logo">트립<em>픽</em></span>
  <span class="nav-sub">AI 여행 플래너</span>
  <div class="nav-actions">
    <button class="nav-btn" onclick="openLoad()">📂 불러오기</button>
    <button class="nav-btn save" id="savebtn" onclick="saveTrip()" style="display:none">💾 저장하기</button>
  </div>
</nav>

<!-- 저장 목록 모달 -->
<div class="modal-bg" id="loadModal">
  <div class="modal">
    <div class="modal-head">
      <h3>저장된 여행 플랜</h3>
      <button class="modal-close" onclick="closeLoad()">×</button>
    </div>
    <div class="modal-body">
      <div class="save-list" id="saveList">
        <p style="color:var(--muted);font-size:0.82rem;text-align:center;padding:1.5rem 0">저장된 여행이 없어요</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline btn-sm" onclick="closeLoad()">닫기</button>
    </div>
  </div>
</div>

<div class="app">
<aside class="sidebar">

  <!-- 기본 정보 -->
  <div class="sec">
    <p class="slabel">🌏 기본 정보</p>
    <div class="field"><label>목적지</label><input type="text" id="dest" placeholder="예: 오사카, 일본"/></div>
    <div class="row2">
      <div class="field"><label>인원</label>
        <select id="people">
          <option>1명</option><option>2명</option><option selected>3~5명</option>
          <option>6명 이상</option><option>가족(아이 포함)</option>
        </select>
      </div>
      <div class="field"><label>예산</label>
        <select id="budget">
          <option>저예산</option><option selected>중간</option><option>넉넉하게</option>
        </select>
      </div>
    </div>
    <div class="field"><label>여행 스타일</label>
      <select id="style">
        <option>알차게 관광</option><option>여유롭게 힐링</option>
        <option selected>맛집 위주</option><option>액티비티 위주</option>
        <option>문화/역사 탐방</option><option>자연 속 힐링</option><option>쇼핑 위주</option>
      </select>
    </div>
    <div class="field"><label>특별 요청사항 (선택)</label>
      <textarea id="extra" placeholder="예: 채식, 유모차 가능한 곳, 영어 메뉴..."></textarea>
    </div>
  </div>

  <hr class="div"/>

  <!-- 항공편 -->
  <div class="sec">
    <p class="slabel">✈️ 항공편</p>

    <div class="flight-block">
      <div class="flight-head">✈ 가는 편</div>
      <div class="flight-route">
        <div class="flight-ap"><input type="text" id="dep-ap" placeholder="출발 공항" style="text-align:center"/></div>
        <div class="flight-arrow">→</div>
        <div class="flight-ap"><input type="text" id="arr-ap" placeholder="도착 공항" style="text-align:center"/></div>
      </div>
      <div class="row2">
        <div class="field"><label>출발 일시</label><input type="date" id="dep-date" oninput="calcArr()"/></div>
        <div class="field"><label>출발 시간</label><input type="time" id="dep-time" value="08:00" oninput="calcArr()"/></div>
      </div>
      <div class="flight-dur">
        <label>✈ 비행시간</label>
        <input type="text" id="dep-dur" value="2시간 30분" placeholder="2시간 30분" oninput="calcArr()"/>
        <span>입력하면 도착 자동계산</span>
      </div>
      <div class="row2">
        <div class="field"><label>도착 일시</label><input type="date" id="arr-date"/></div>
        <div class="field"><label>도착 시간</label><input type="time" id="arr-time" value="10:30"/></div>
      </div>
    </div>

    <div class="flight-block">
      <div class="flight-head">✈ 오는 편</div>
      <div class="flight-route">
        <div class="flight-ap"><input type="text" id="ret-dep-ap" placeholder="출발 공항" style="text-align:center"/></div>
        <div class="flight-arrow">→</div>
        <div class="flight-ap"><input type="text" id="ret-arr-ap" placeholder="도착 공항" style="text-align:center"/></div>
      </div>
      <div class="row2">
        <div class="field"><label>출발 일시</label><input type="date" id="ret-dep-date" oninput="calcRetArr()"/></div>
        <div class="field"><label>출발 시간</label><input type="time" id="ret-dep-time" value="18:00" oninput="calcRetArr()"/></div>
      </div>
      <div class="flight-dur">
        <label>✈ 비행시간</label>
        <input type="text" id="ret-dur" value="2시간 30분" placeholder="2시간 30분" oninput="calcRetArr()"/>
        <span>입력하면 도착 자동계산</span>
      </div>
      <div class="row2">
        <div class="field"><label>도착 일시</label><input type="date" id="ret-arr-date"/></div>
        <div class="field"><label>도착 시간</label><input type="time" id="ret-arr-time" value="20:30"/></div>
      </div>
    </div>
  </div>

  <hr class="div"/>

  <!-- 호텔 -->
  <div class="sec">
    <div class="toggle-row">
      <div>
        <label for="hotel-toggle">🏨 호텔 직접 입력</label>
        <small>체크 해제 시 AI가 자동 추천</small>
      </div>
      <label class="switch">
        <input type="checkbox" id="hotel-toggle" onchange="toggleHotels(this.checked)"/>
        <span class="switch-slider"></span>
      </label>
    </div>
    <div id="hotel-section" style="display:none;margin-top:0.5rem">
      <div class="hotel-list" id="hotel-list"></div>
      <button class="add-hotel-btn" onclick="addHotel()">+ 호텔 추가</button>
    </div>
  </div>

  <hr class="div"/>

  <!-- 사진 -->
  <div class="sec">
    <p class="slabel">📷 참고 사진 (선택)</p>
    <div class="upload-zone" id="zone">
      <input type="file" id="fileinput" multiple accept="image/*" onchange="handleFiles(this.files)"/>
      <p>가고 싶은 곳 사진을 올리면<br>AI가 참고해서 플랜을 짜줘요</p>
    </div>
    <div class="thumb-row" id="thumbrow"></div>
  </div>

  <div class="err-msg" id="errmsg"></div>
  <button class="btn" id="genbtn" onclick="generate()" style="margin-top:0.5rem">✦ 여행 플랜 생성하기</button>

</aside>

<main class="main">
  <div class="empty-state" id="emptystate">
    <div class="empty-icon">✈️</div>
    <strong style="font-size:0.95rem">항공편 정보와 여행 조건을 입력하고<br>플랜을 생성해보세요</strong>
    <p style="font-size:0.77rem;margin-top:4px;line-height:1.6">실제 체류 시간에 맞춰 일정을 짜고<br>맛집 선택지 · 교통 상세 · 지도 동선을 만들어줘요</p>
  </div>
  <div class="loading-state" id="loadingstate">
    <div class="spinner"></div>
    <span id="loadmsg">여행 플랜을 만들고 있어요...</span>
  </div>
  <div id="result" style="display:none;flex-direction:column;gap:1rem">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">📍 동선 지도</span>
        <span id="maplabel" style="font-size:0.72rem;color:var(--muted)"></span>
      </div>
      <div id="map"></div>
    </div>
    <div class="card" style="padding:0">
      <div class="tabs" id="tabs"></div>
      <div id="timeline"></div>
    </div>
    <div class="card" style="padding:0">
      <div class="card-head"><span class="card-title">💡 여행 꿀팁</span></div>
      <ul class="tips-list" id="tipslist"></ul>
    </div>
  </div>
</main>
</div>

<script>
// ── STATE ──
const imgs=[];
let tripData=null,currentDay=0,leafletMap=null,mapMarkers=[],mapLines=[];
let hotelCount=0;

// ── UPLOAD ──
const zone=document.getElementById('zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.style.borderColor='var(--forest2)'});
zone.addEventListener('dragleave',()=>zone.style.borderColor='');
zone.addEventListener('drop',e=>{e.preventDefault();zone.style.borderColor='';handleFiles(e.dataTransfer.files)});
function handleFiles(files){
  for(const f of files){
    if(!f.type.startsWith('image/'))continue;
    const r=new FileReader();
    r.onload=e=>{imgs.push({url:e.target.result,file:f});renderThumbs()};
    r.readAsDataURL(f);
  }
}
function renderThumbs(){
  const row=document.getElementById('thumbrow');row.innerHTML='';
  imgs.forEach((img,i)=>{
    const w=document.createElement('div');w.className='thumb-wrap';
    w.innerHTML=`<img src="${img.url}" class="thumb"/><button class="thumb-rm" onclick="removeImg(${i})">✕</button>`;
    row.appendChild(w);
  });
}
function removeImg(i){imgs.splice(i,1);renderThumbs()}

// ── HOTELS ──
function toggleHotels(on){
  document.getElementById('hotel-section').style.display=on?'block':'none';
  if(on&&document.getElementById('hotel-list').children.length===0) addHotel();
}
function addHotel(){
  hotelCount++;
  const id=`hotel-${hotelCount}`;
  const div=document.createElement('div');
  div.className='hotel-card';div.id=id;
  const depDate=document.getElementById('dep-date').value||'';
  const retDate=document.getElementById('ret-dep-date').value||'';
  div.innerHTML=`
    <div class="hotel-num">호텔 ${hotelCount}</div>
    <button class="hotel-rm" onclick="removeHotel('${id}')">✕</button>
    <div class="field"><label>호텔 이름</label><input type="text" placeholder="예: 도톤보리 호텔"/></div>
    <div class="row2">
      <div class="field"><label>체크인</label><input type="date" value="${depDate}"/></div>
      <div class="field"><label>체크아웃</label><input type="date" value="${retDate}"/></div>
    </div>
    <div class="field"><label>주소 / 위치 (선택)</label><input type="text" placeholder="예: 난바 근처"/></div>`;
  document.getElementById('hotel-list').appendChild(div);
}
function removeHotel(id){document.getElementById(id).remove()}
function getHotels(){
  return [...document.getElementById('hotel-list').children].map(card=>{
    const inputs=card.querySelectorAll('input');
    return{name:inputs[0].value,checkin:inputs[1].value,checkout:inputs[2].value,location:inputs[3].value};
  }).filter(h=>h.name);
}

// ── HELPERS ──
function showErr(msg){const e=document.getElementById('errmsg');e.textContent=msg;e.style.display='block'}
function hideErr(){document.getElementById('errmsg').style.display='none'}
function setLoading(on){
  document.getElementById('loadingstate').classList.toggle('on',on);
  document.getElementById('emptystate').style.display=on?'none':'';
  document.getElementById('result').style.display='none';
  document.getElementById('genbtn').disabled=on;
  document.getElementById('genbtn').textContent=on?'생성 중...':'✦ 여행 플랜 생성하기';
}

// ── GENERATE ──
async function generate(){
  hideErr();
  const dest=document.getElementById('dest').value.trim();
  if(!dest){showErr('목적지를 입력해주세요');return}

  const depDate=document.getElementById('dep-date').value;
  const depTime=document.getElementById('dep-time').value;
  const arrDate=document.getElementById('arr-date').value;
  const arrTime=document.getElementById('arr-time').value;
  const retDepDate=document.getElementById('ret-dep-date').value;
  const retDepTime=document.getElementById('ret-dep-time').value;
  const retArrDate=document.getElementById('ret-arr-date').value;
  const retArrTime=document.getElementById('ret-arr-time').value;
  const depAp=document.getElementById('dep-ap').value||'출발 공항';
  const arrAp=document.getElementById('arr-ap').value||'도착 공항';
  const retDepAp=document.getElementById('ret-dep-ap').value||arrAp;
  const retArrAp=document.getElementById('ret-arr-ap').value||depAp;

  const people=document.getElementById('people').value;
  const budget=document.getElementById('budget').value;
  const style=document.getElementById('style').value;
  const extra=document.getElementById('extra').value.trim();
  const hotels=document.getElementById('hotel-toggle').checked?getHotels():[];

  let days=3;
  if(arrDate&&retDepDate){
    const d=Math.round((new Date(retDepDate)-new Date(arrDate))/86400000);
    if(d>=0) days=d+1;
  }

  setLoading(true);

  const flightInfo=`
가는 편: ${depDate||'미정'} ${depTime} ${depAp} 출발 → ${arrDate||'미정'} ${arrTime} ${arrAp} 도착
오는 편: ${retDepDate||'미정'} ${retDepTime} ${retDepAp} 출발 → ${retArrDate||'미정'} ${retArrTime} ${retArrAp} 도착`;

  const hotelInfo=hotels.length>0
    ?'\n숙소 정보:\n'+hotels.map((h,i)=>`  호텔${i+1}: ${h.name} (체크인 ${h.checkin}, 체크아웃 ${h.checkout}${h.location?', 위치: '+h.location:''})`).join('\n')
    :'\n숙소: AI가 지역별 추천';

  const prompt=`당신은 여행 플래너 전문가입니다. 아래 조건으로 현실적인 여행 일정을 JSON으로만 출력하세요.

목적지: ${dest}
총 체류: ${days}일
인원: ${people} / 예산: ${budget} / 스타일: ${style}
${extra?'요청: '+extra:''}

항공편 정보:${flightInfo}
${hotelInfo}

⚠️ 중요 규칙:
- 첫날: 도착 시간(${arrTime||'?'}) 이후부터 일정을 시작하고, 공항에서 숙소까지 이동 시간 반영
- 마지막날: 귀국 항공편(${retDepTime||'?'}) 기준으로 공항 도착 2시간 전에 출발, 그 이전에만 일정 배치
- 호텔이 지정된 경우 체크인/체크아웃을 일정에 포함
- 각 장소 이동시간을 현실적으로 반영
- 반드시 JSON만 출력, 다른 텍스트 금지

{
  "destination": "도시명, 국가",
  "summary": "여행 한줄 소개",
  "centerLat": 위도숫자,
  "centerLng": 경도숫자,
  "days": [
    {
      "day": 1,
      "date": "${arrDate||''}",
      "title": "1일차 부제목",
      "items": [
        {
          "type": "flight",
          "label": "가는 편 도착",
          "from": "${depAp}",
          "to": "${arrAp}",
          "departTime": "${depDate} ${depTime}",
          "arriveTime": "${arrDate} ${arrTime}",
          "note": "입국 심사 및 수하물 수령 약 30~60분 소요"
        },
        {
          "type": "transport",
          "method": "공항철도|버스|택시 등",
          "duration": "약 ?분",
          "detail": "공항에서 숙소까지 구체적 경로 설명",
          "cost": "금액"
        },
        {
          "type": "hotel",
          "action": "체크인",
          "name": "호텔명 (지정 없으면 추천 호텔명)",
          "time": "15:00",
          "location": "지역명",
          "lat": 위도숫자,
          "lng": 경도숫자,
          "tip": "호텔 관련 팁"
        },
        {
          "type": "place",
          "time": "17:00",
          "name": "장소명",
          "category": "관광|식사|숙소|쇼핑|액티비티 중 하나",
          "duration": "1시간 30분",
          "description": "장소 설명 2~3문장",
          "hours": "운영시간",
          "price": "입장료 또는 무료",
          "tip": "현지 꿀팁",
          "lat": 위도숫자,
          "lng": 경도숫자
        },
        {
          "type": "transport",
          "method": "도보|지하철|버스|택시",
          "duration": "약 10분",
          "detail": "구체적 이동 방법 (노선명, 역명, 출구번호 등)",
          "cost": "금액 또는 무료"
        },
        {
          "type": "meal",
          "time": "19:00",
          "mealType": "저녁",
          "options": [
            {
              "name": "맛집명",
              "genre": "장르 (예: 라멘, 스시, 이자카야)",
              "imageKeyword": "영어 이미지 검색 키워드 (예: ramen bowl japanese)",
              "description": "설명 2문장. 분위기와 대표메뉴 포함.",
              "price": "1인 예산",
              "waitTime": "웨이팅 여부",
              "tip": "추천 메뉴 또는 팁",
              "lat": 위도숫자,
              "lng": 경도숫자
            },
            {"name":"맛집2","genre":"장르","imageKeyword":"영어키워드","description":"설명","price":"예산","waitTime":"웨이팅","tip":"팁","lat":위도,"lng":경도},
            {"name":"맛집3","genre":"장르","imageKeyword":"영어키워드","description":"설명","price":"예산","waitTime":"웨이팅","tip":"팁","lat":위도,"lng":경도}
          ]
        }
      ]
    }
  ],
  "tips": ["팁1","팁2","팁3","팁4","팁5"]
}

⚠️ meal type의 options는 반드시 3개 이상 포함하세요. imageKeyword는 Unsplash에서 검색할 영어 키워드로, 음식 종류를 구체적으로 써주세요 (예: "sushi plate japanese", "osaka takoyaki street food", "ramen noodle soup").
마지막날 마지막 items에는 반드시 귀국 항공편을 포함하세요:
{"type":"flight","label":"귀국 편 출발","from":"${retDepAp}","to":"${retArrAp}","departTime":"${retDepDate} ${retDepTime}","arriveTime":"${retArrDate} ${retArrTime}","note":"공항 2시간 전 도착 권장"}`;

  try{
    let response;
    if(imgs.length>0) response=await puter.ai.chat(prompt,imgs[0].url,{model:'gemini-2.5-flash'});
    else response=await puter.ai.chat(prompt,{model:'gemini-2.5-flash'});

    let text='';
    if(typeof response==='string') text=response;
    else if(response?.message?.content){
      const c=response.message.content;
      text=Array.isArray(c)?c.map(x=>x.text||'').join(''):String(c);
    } else text=response?.text||JSON.stringify(response);

    const match=text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('응답 파싱 실패. 다시 시도해주세요.');
    tripData=JSON.parse(match[0]);
    setLoading(false);
    renderResult(tripData,people,style);
  }catch(e){
    setLoading(false);
    document.getElementById('emptystate').style.display='flex';
    showErr('오류: '+(e?.message||String(e)));
  }
}

const CAT_COLOR={관광:'#2563EB',식사:'#EA580C',숙소:'#7C3AED',쇼핑:'#DC2626',액티비티:'#16A34A',비행:'#0284C7',호텔:'#C9973A'};

function renderResult(data,people,style){
  document.getElementById('emptystate').style.display='none';
  const r=document.getElementById('result');
  r.style.display='flex';
  document.getElementById('savebtn').style.display='';

  const arrDate=document.getElementById('arr-date').value;
  const retDepDate=document.getElementById('ret-dep-date').value;
  const dateStr=arrDate&&retDepDate?`${arrDate.slice(5)}~${retDepDate.slice(5)}`:`${data.days.length}일`;
  document.getElementById('summaryGrid').innerHTML=`
    <div class="s-chip"><div class="v">${data.destination}</div><div class="k">목적지</div></div>
    <div class="s-chip"><div class="v">${dateStr}</div><div class="k">일정</div></div>
    <div class="s-chip"><div class="v">${people}</div><div class="k">인원</div></div>
    <div class="s-chip"><div class="v">${style}</div><div class="k">스타일</div></div>`;

  initMap(data);
  currentDay=0;
  renderTabs(data);
  renderTimeline(data,0);
  document.getElementById('tipslist').innerHTML=(data.tips||[]).map(t=>`<li>${t}</li>`).join('');
}

function initMap(data){
  if(leafletMap){leafletMap.remove();leafletMap=null}
  leafletMap=L.map('map').setView([data.centerLat||35.6,data.centerLng||139.7],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(leafletMap);
  showDayOnMap(data,0);
}

function showDayOnMap(data,dayIdx){
  mapMarkers.forEach(m=>m.remove());mapLines.forEach(l=>l.remove());
  mapMarkers=[];mapLines=[];
  const day=data.days[dayIdx];
  if(!day)return;
  document.getElementById('maplabel').textContent=`Day ${day.day}${day.title?' — '+day.title:''}`;

  const points=[];let num=1;
  day.items.forEach(item=>{
    if(item.type==='place'&&item.lat&&item.lng){
      points.push({lat:item.lat,lng:item.lng,label:String(num++),name:item.name,color:CAT_COLOR[item.category]||'#6B7280',desc:item.description,time:item.time,cat:item.category});
    } else if(item.type==='hotel'&&item.lat&&item.lng){
      points.push({lat:item.lat,lng:item.lng,label:'🏨',name:item.name,color:'#C9973A',desc:item.location,time:item.time,cat:'호텔'});
    } else if(item.type==='meal'){
      const sel=(item.options||[]).find(o=>o._sel)||(item.options||[])[0];
      if(sel?.lat&&sel?.lng) points.push({lat:sel.lat,lng:sel.lng,label:'🍽',name:sel.name,color:'#EA580C',desc:sel.description,time:item.time,cat:'식사'});
    }
  });

  if(points.length>1){
    const l=L.polyline(points.map(p=>[p.lat,p.lng]),{color:'#1B4332',weight:2,opacity:0.4,dashArray:'6,4'}).addTo(leafletMap);
    mapLines.push(l);
  }
  points.forEach(p=>{
    const icon=L.divIcon({className:'',html:`<div style="min-width:26px;height:26px;background:${p.color};border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 5px rgba(0,0,0,0.22);padding:0 4px">${p.label}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    const m=L.marker([p.lat,p.lng],{icon}).addTo(leafletMap)
      .bindPopup(`<b style="font-size:13px">${p.name}</b><br><span style="color:#999;font-size:11px">${p.time||''} · ${p.cat}</span><br><p style="font-size:11px;margin-top:3px;color:#555;max-width:180px">${(p.desc||'').slice(0,90)}${(p.desc||'').length>90?'...':''}</p>`);
    mapMarkers.push(m);
  });
  if(points.length>1){leafletMap.fitBounds(L.featureGroup(mapMarkers).getBounds().pad(0.18))}
  else if(points.length===1){leafletMap.setView([points[0].lat,points[0].lng],15)}
}

function renderTabs(data){
  const tabs=document.getElementById('tabs');tabs.innerHTML='';
  data.days.forEach((day,i)=>{
    const t=document.createElement('button');
    t.className='tab'+(i===0?' active':'');
    t.innerHTML=`Day ${day.day}${day.date?`<br><span style="font-size:0.6rem;opacity:0.7">${day.date.slice(5)}</span>`:''}`;
    t.style.lineHeight='1.3';
    t.onclick=()=>switchDay(i);
    tabs.appendChild(t);
  });
}

function switchDay(idx){
  currentDay=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderTimeline(tripData,idx);
  showDayOnMap(tripData,idx);
}

function toggleDetail(id,header){
  const el=document.getElementById(id);if(!el)return;
  const open=el.classList.toggle('open');
  header.classList.toggle('expanded',open);
}
function selectResto(card){
  card.closest('.resto-grid').querySelectorAll('.rc').forEach(c=>c.classList.remove('sel'));
  card.classList.add('sel');
}

// ── FLIGHT TIME CALC ──
function parseDuration(str){
  if(!str)return 0;
  let min=0;
  const h=str.match(/(\d+)\s*시간/);
  const m=str.match(/(\d+)\s*분/);
  if(h)min+=parseInt(h[1])*60;
  if(m)min+=parseInt(m[1]);
  if(!h&&!m){const n=parseFloat(str);if(!isNaN(n))min=n*60;}
  return min;
}
function calcArrival(dateId,timeId,durId,resDateId,resTimeId){
  const date=document.getElementById(dateId).value;
  const time=document.getElementById(timeId).value;
  const dur=document.getElementById(durId).value;
  if(!date||!time)return;
  const mins=parseDuration(dur);
  if(mins<=0)return;
  const dt=new Date(date+'T'+time);
  dt.setMinutes(dt.getMinutes()+mins);
  document.getElementById(resDateId).value=dt.toISOString().slice(0,10);
  document.getElementById(resTimeId).value=dt.toTimeString().slice(0,5);
}
function calcArr(){calcArrival('dep-date','dep-time','dep-dur','arr-date','arr-time')}
function calcRetArr(){calcArrival('ret-dep-date','ret-dep-time','ret-dur','ret-arr-date','ret-arr-time')}

// ── SAVE / LOAD (Puter.js) ──
const SAVE_DIR='tripplanner';

async function ensureDir(){
  try{await puter.fs.mkdir(SAVE_DIR,{recursive:true})}catch(e){}
}

async function saveTrip(){
  if(!tripData){alert('먼저 여행 플랜을 생성해주세요');return}
  const name=prompt('여행 이름을 입력하세요',tripData.destination+' 여행');
  if(!name)return;
  try{
    await ensureDir();
    const payload={
      name,
      destination:tripData.destination,
      savedAt:new Date().toISOString(),
      formData:{
        dest:document.getElementById('dest').value,
        people:document.getElementById('people').value,
        budget:document.getElementById('budget').value,
        style:document.getElementById('style').value,
        extra:document.getElementById('extra').value,
        depAp:document.getElementById('dep-ap').value,
        arrAp:document.getElementById('arr-ap').value,
        depDate:document.getElementById('dep-date').value,
        depTime:document.getElementById('dep-time').value,
        depDur:document.getElementById('dep-dur').value,
        arrDate:document.getElementById('arr-date').value,
        arrTime:document.getElementById('arr-time').value,
        retDepAp:document.getElementById('ret-dep-ap').value,
        retArrAp:document.getElementById('ret-arr-ap').value,
        retDepDate:document.getElementById('ret-dep-date').value,
        retDepTime:document.getElementById('ret-dep-time').value,
        retDur:document.getElementById('ret-dur').value,
        retArrDate:document.getElementById('ret-arr-date').value,
        retArrTime:document.getElementById('ret-arr-time').value,
      },
      tripData
    };
    const fname=SAVE_DIR+'/'+Date.now()+'.json';
    await puter.fs.write(fname,JSON.stringify(payload,null,2));
    showToast('💾 저장됐어요 — '+name);
  }catch(e){alert('저장 실패: '+(e?.message||e))}
}

async function openLoad(){
  document.getElementById('loadModal').classList.add('on');
  await refreshSaveList();
}
function closeLoad(){document.getElementById('loadModal').classList.remove('on')}

async function refreshSaveList(){
  const list=document.getElementById('saveList');
  list.innerHTML='<p style="color:var(--muted);font-size:0.82rem;text-align:center;padding:1rem 0">불러오는 중...</p>';
  try{
    await ensureDir();
    const files=await puter.fs.readdir(SAVE_DIR);
    const jsonFiles=files.filter(f=>f.name.endsWith('.json')).sort((a,b)=>b.name.localeCompare(a.name));
    if(!jsonFiles.length){
      list.innerHTML='<p style="color:var(--muted);font-size:0.82rem;text-align:center;padding:1.5rem 0">저장된 여행이 없어요</p>';
      return;
    }
    list.innerHTML='';
    for(const f of jsonFiles){
      try{
        const raw=await puter.fs.read(SAVE_DIR+'/'+f.name);
        const text=await raw.text();
        const data=JSON.parse(text);
        const date=new Date(data.savedAt).toLocaleDateString('ko-KR');
        const item=document.createElement('div');
        item.className='save-item';
        item.innerHTML=`
          <div class="si-icon">✈️</div>
          <div class="si-info" onclick="loadTrip('${SAVE_DIR}/${f.name}')">
            <div class="si-name">${data.name}</div>
            <div class="si-meta">${data.destination} · ${date}</div>
          </div>
          <button class="si-del" onclick="deleteTrip('${SAVE_DIR}/${f.name}',this)" title="삭제">🗑</button>`;
        list.appendChild(item);
      }catch(e){}
    }
  }catch(e){
    list.innerHTML='<p style="color:var(--red);font-size:0.82rem;padding:1rem">불러오기 실패: '+(e?.message||e)+'</p>';
  }
}

async function loadTrip(path){
  try{
    const raw=await puter.fs.read(path);
    const text=await raw.text();
    const data=JSON.parse(text);
    const fd=data.formData||{};
    // restore form
    const set=(id,v)=>{const el=document.getElementById(id);if(el&&v!==undefined)el.value=v};
    set('dest',fd.dest);set('people',fd.people);set('budget',fd.budget);
    set('style',fd.style);set('extra',fd.extra);
    set('dep-ap',fd.depAp);set('arr-ap',fd.arrAp);
    set('dep-date',fd.depDate);set('dep-time',fd.depTime);set('dep-dur',fd.depDur);
    set('arr-date',fd.arrDate);set('arr-time',fd.arrTime);
    set('ret-dep-ap',fd.retDepAp);set('ret-arr-ap',fd.retArrAp);
    set('ret-dep-date',fd.retDepDate);set('ret-dep-time',fd.retDepTime);set('ret-dur',fd.retDur);
    set('ret-arr-date',fd.retArrDate);set('ret-arr-time',fd.retArrTime);
    tripData=data.tripData;
    closeLoad();
    setLoading(false);
    renderResult(tripData,fd.people||'',fd.style||'');
    document.getElementById('savebtn').style.display='';
    showToast('📂 불러왔어요 — '+data.name);
  }catch(e){alert('불러오기 실패: '+(e?.message||e))}
}

async function deleteTrip(path,btn){
  if(!confirm('이 여행을 삭제할까요?'))return;
  try{
    await puter.fs.delete(path);
    btn.closest('.save-item').remove();
    const list=document.getElementById('saveList');
    if(!list.children.length) list.innerHTML='<p style="color:var(--muted);font-size:0.82rem;text-align:center;padding:1.5rem 0">저장된 여행이 없어요</p>';
    showToast('🗑 삭제됐어요');
  }catch(e){alert('삭제 실패: '+(e?.message||e))}
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1B4332;color:#fff;padding:0.55rem 1.25rem;border-radius:20px;font-size:0.82rem;font-weight:500;z-index:999;opacity:0;transition:opacity 0.25s';document.body.appendChild(t)}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}
